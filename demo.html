<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonBit Markdown Editor - 交互式演示</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --pink: #f778ba;
    --hl-bg: #1c2128;
    --danger: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px;
  }
  .container { max-width: 1400px; margin: 0 auto; }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 2em;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-muted);
    font-size: 1em;
    margin-top: 8px;
  }
  .header .badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: 600;
  }
  .badge.status {
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.3);
  }

  /* Editor layout */
  .editor-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    min-height: 500px;
  }
  @media (max-width: 900px) {
    .editor-layout { grid-template-columns: 1fr; }
  }

  .editor-pane, .preview-pane {
    display: flex;
    flex-direction: column;
  }
  .editor-pane {
    border-right: 1px solid var(--border);
  }
  @media (max-width: 900px) {
    .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
  }

  .pane-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }
  .pane-header .char-count {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
  .pane-header .char-count span { color: var(--accent); }

  textarea#md-input {
    flex: 1;
    background: #010409;
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.9em;
    line-height: 1.65;
    tab-size: 4;
    min-height: 460px;
  }
  textarea#md-input:focus { background: #02050a; }

  #preview-area {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    min-height: 460px;
    line-height: 1.7;
    font-size: 0.95em;
  }
  #preview-area h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; margin: 0.6em 0 0.3em; }
  #preview-area h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; margin: 0.5em 0 0.25em; }
  #preview-area h3 { font-size: 1.1em; margin: 0.4em 0 0.2em; }
  #preview-area h4, #preview-area h5, #preview-area h6 { margin: 0.3em 0 0.15em; }
  #preview-area p { margin: 0.5em 0; }
  #preview-area ul, #preview-area ol { margin: 0.4em 0; padding-left: 1.5em; }
  #preview-area li { margin: 0.2em 0; }
  #preview-area blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 0.5em 0;
    color: var(--text-muted);
  }
  #preview-area pre {
    background: var(--hl-bg);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 0.5em 0;
  }
  #preview-area code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.85em;
  }
  #preview-area p > code {
    background: rgba(88,166,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }
  #preview-area table {
    border-collapse: collapse;
    margin: 0.5em 0;
    width: 100%;
  }
  #preview-area th, #preview-area td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }
  #preview-area th { background: var(--hl-bg); font-weight: 600; }
  #preview-area hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  #preview-area a { color: var(--accent); text-decoration: none; }
  #preview-area a:hover { text-decoration: underline; }
  #preview-area img { max-width: 100%; border-radius: 6px; }
  #preview-area del { color: var(--text-muted); }
  #preview-area input[type="checkbox"] { margin-right: 6px; transform: scale(1.1); }

  /* Syntax highlighting in preview */
  .hl-keyword { color: #ff7b72; }
  .hl-string { color: #a5d6ff; }
  .hl-comment { color: #8b949e; font-style: italic; }
  .hl-number { color: #79c0ff; }
  .hl-type { color: #ffa657; }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82em;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .controls input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
  }
  .controls .btn-group { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 7px 20px;
    border-radius: 6px;
    border: none;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #4090e8; }
  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--border);
  }
  .btn-danger:hover { border-color: var(--danger); }

  .controls .sep {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.78em;
    color: var(--text-muted);
    min-height: 36px;
  }
  .status-bar .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }
  .status-bar .status-dot.ready { background: var(--green); }
  .status-bar .status-dot.error { background: var(--danger); }
  .status-bar .status-msg { flex: 1; }

  /* Raw HTML output */
  .raw-output {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .raw-output.visible { display: block; }
  .raw-output-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }
  .raw-output-content {
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82em;
    white-space: pre-wrap;
    word-break: break-all;
    color: #7ee787;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.5;
  }

  /* TOC panel */
  .toc-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .toc-panel.visible { display: block; }
  .toc-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.8em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }
  .toc-content {
    padding: 12px 16px;
    font-size: 0.9em;
    line-height: 1.8;
  }
  .toc-content .toc-h2 { padding-left: 20px; }
  .toc-content .toc-h3 { padding-left: 40px; }
  .toc-content .toc-h4 { padding-left: 60px; }
  .toc-content .toc-h5 { padding-left: 80px; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 0.85em;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }

  /* Loading */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,17,23,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loading-overlay.active { display: flex; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 0.9em; }
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">正在加载 MoonBit Markdown 引擎...</div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>moonbit-texteditor</h1>
    <p>纯 MoonBit 编写的 Markdown → HTML 转换库 · 交互式演示</p>
    <div>
      <span class="badge status" id="status-badge">● 等待加载</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <label><input type="checkbox" id="opt-tables" checked> GFM 表格</label>
    <label><input type="checkbox" id="opt-tasklist" checked> 任务列表</label>
    <label><input type="checkbox" id="opt-strikethrough" checked> 删除线</label>
    <label><input type="checkbox" id="opt-autolink" checked> 自动链接</label>
    <label><input type="checkbox" id="opt-highlight" checked> 语法高亮</label>
    <label><input type="checkbox" id="opt-hardwrap"> 硬换行</label>

    <div class="sep"></div>
    <label><input type="checkbox" id="opt-show-raw"> 显示原始 HTML</label>
    <label><input type="checkbox" id="opt-show-toc"> 显示目录</label>

    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-sample">加载样例</button>
      <button class="btn btn-danger" id="btn-clear">清空</button>
      <button class="btn btn-primary" id="btn-render">渲染</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-msg" id="status-msg">就绪</span>
  </div>

  <!-- Split editor -->
  <div class="editor-layout">
    <div class="editor-pane">
      <div class="pane-header">
        <span>Markdown 输入</span>
        <span class="char-count">字数: <span id="char-count">0</span></span>
      </div>
      <textarea id="md-input" placeholder="在此输入 Markdown...&#10;&#10;支持 CommonMark + GFM 扩展 + 增强功能"># Hello, MoonBit!

This is a **Markdown** to *HTML* converter written entirely in [MoonBit](https://www.moonbitlang.com).

## Features

- [x] CommonMark core syntax
- [x] GFM tables, task lists, strikethrough, autolinks
- [x] Syntax highlighting
- [x] Frontmatter metadata
- [x] Table of contents generation

| Feature | Status |
|---------|--------|
| Headings | ✅ |
| Lists | ✅ |
| Code blocks | ✅ |
| Tables | ✅ |

> **Try it out:** Edit the text on the left and click "渲染" to see the result.</textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-header">
        <span>HTML 预览</span>
        <span class="char-count"><span id="html-size">0</span> bytes</span>
      </div>
      <div id="preview-area">
        <p style="color:var(--text-muted);font-style:italic;">点击"渲染"按钮查看 HTML 输出...</p>
      </div>
    </div>
  </div>

  <!-- Raw HTML output -->
  <div class="raw-output" id="raw-output">
    <div class="raw-output-header">
      <span>原始 HTML 输出</span>
      <button class="btn btn-secondary" style="padding:3px 10px;font-size:0.75em;" id="btn-copy-raw">复制</button>
    </div>
    <div class="raw-output-content" id="raw-output-content"></div>
  </div>

  <!-- TOC -->
  <div class="toc-panel" id="toc-panel">
    <div class="toc-header">📋 目录 (Table of Contents)</div>
    <div class="toc-content" id="toc-content"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>moonbit-texteditor · 纯 MoonBit Markdown 转换引擎 · Apache-2.0 License</p>
  </div>
</div>

<script src="_build/js/debug/build/web/web.editor.js"></script>
<script>
(function() {
  'use strict';

  const DOM = {
    input: document.getElementById('md-input'),
    preview: document.getElementById('preview-area'),
    statusMsg: document.getElementById('status-msg'),
    statusDot: document.getElementById('status-dot'),
    statusBadge: document.getElementById('status-badge'),
    charCount: document.getElementById('char-count'),
    htmlSize: document.getElementById('html-size'),
    btnRender: document.getElementById('btn-render'),
    btnClear: document.getElementById('btn-clear'),
    btnSample: document.getElementById('btn-sample'),
    btnCopyRaw: document.getElementById('btn-copy-raw'),
    rawOutput: document.getElementById('raw-output'),
    rawContent: document.getElementById('raw-output-content'),
    tocPanel: document.getElementById('toc-panel'),
    tocContent: document.getElementById('toc-content'),
    overlay: document.getElementById('loading-overlay'),
    optTables: document.getElementById('opt-tables'),
    optTasklist: document.getElementById('opt-tasklist'),
    optStrikethrough: document.getElementById('opt-strikethrough'),
    optAutolink: document.getElementById('opt-autolink'),
    optHighlight: document.getElementById('opt-highlight'),
    optHardwrap: document.getElementById('opt-hardwrap'),
    optShowRaw: document.getElementById('opt-show-raw'),
    optShowToc: document.getElementById('opt-show-toc'),
  };

  function setStatus(msg, type) {
    DOM.statusMsg.textContent = msg;
    DOM.statusDot.className = 'status-dot' + (type ? ' ' + type : '');
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    return (bytes / 1024).toFixed(1) + ' KB';
  }

  // Check if MoonBit module is loaded
  function checkModule() {
    if (window.__moonbit && typeof window.__moonbit.render_md === 'function') {
      DOM.statusBadge.innerHTML = '● MoonBit 引擎已加载';
      DOM.statusBadge.style.borderColor = 'rgba(63,185,80,0.3)';
      DOM.statusBadge.style.color = '#3fb950';
      DOM.statusBadge.style.background = 'rgba(63,185,80,0.15)';
      DOM.overlay.classList.remove('active');
      setStatus('就绪', 'ready');
      return true;
    }
    return false;
  }

  // Wait for module
  function waitForModule(retries) {
    retries = retries || 0;
    if (retries > 100) {
      DOM.overlay.classList.remove('active');
      setStatus('加载 MoonBit 引擎失败，请刷新页面重试', 'error');
      DOM.statusBadge.textContent = '● 加载失败';
      DOM.statusBadge.style.borderColor = 'rgba(248,81,73,0.3)';
      DOM.statusBadge.style.color = '#f85149';
      DOM.statusBadge.style.background = 'rgba(248,81,73,0.15)';
      return;
    }
    if (checkModule()) return;
    setTimeout(function() { waitForModule(retries + 1); }, 100);
  }

  // Render
  function render() {
    const input = DOM.input.value;
    DOM.charCount.textContent = input.length;

    if (!input.trim()) {
      DOM.preview.innerHTML = '<p style="color:var(--text-muted);font-style:italic;">请输入 Markdown 文本...</p>';
      DOM.htmlSize.textContent = '0';
      DOM.rawContent.textContent = '';
      DOM.rawOutput.classList.remove('visible');
      DOM.tocPanel.classList.remove('visible');
      setStatus('请输入 Markdown 文本', '');
      return;
    }

    if (!window.__moonbit) {
      setStatus('错误: MoonBit 引擎未加载', 'error');
      return;
    }

    try {
      setStatus('正在渲染...', '');

      const opts = {
        tables: DOM.optTables.checked,
        tasklist: DOM.optTasklist.checked,
        strikethrough: DOM.optStrikethrough.checked,
        autolink: DOM.optAutolink.checked,
        highlight: DOM.optHighlight.checked,
        hardwrap: DOM.optHardwrap.checked,
      };

      // render_md_opts(input, tables, tasklist, strikethrough, autolink, highlight, hardwrap)
      const html = window.__moonbit.render_md_opts(
        input,
        opts.tables,
        opts.tasklist,
        opts.strikethrough,
        opts.autolink,
        opts.highlight,
        opts.hardwrap
      );

      // Inject HTML into preview area
      DOM.preview.innerHTML = html + '<div style="margin-top:20px;padding-top:12px;border-top:1px solid var(--border);font-size:0.75em;color:var(--text-muted);">— 渲染完成 —</div>';

      // Raw HTML
      DOM.rawContent.textContent = html;
      DOM.htmlSize.textContent = formatBytes(new TextEncoder().encode(html).length);

      if (DOM.optShowRaw.checked) {
        DOM.rawOutput.classList.add('visible');
      } else {
        DOM.rawOutput.classList.remove('visible');
      }

      // TOC
      if (DOM.optShowToc.checked) {
        try {
          const toc = window.__moonbit.gen_toc(input);
          renderToc(toc);
          DOM.tocPanel.classList.add('visible');
        } catch(e) {
          DOM.tocContent.textContent = '生成目录失败: ' + e.message;
          DOM.tocPanel.classList.add('visible');
        }
      } else {
        DOM.tocPanel.classList.remove('visible');
      }

      setStatus('渲染完成 (' + html.length + ' bytes)', 'ready');
    } catch(e) {
      DOM.preview.innerHTML = '<div style="color:var(--danger);border:1px solid var(--danger);border-radius:6px;padding:12px;"><strong>渲染错误:</strong><br><pre style="margin-top:8px;background:var(--hl-bg);padding:8px;border-radius:4px;color:#ff7b72;">' + escapeHtml(e.toString()) + '</pre></div>';
      setStatus('渲染错误: ' + e.message, 'error');
    }
  }

  function renderToc(toc) {
    if (!toc || toc.length === 0) {
      DOM.tocContent.textContent = '(无标题，无法生成目录)';
      return;
    }
    var html = '';
    for (var i = 0; i < toc.length; i++) {
      var level = toc[i][0];
      var text = toc[i][1];
      var cls = 'toc-h' + Math.min(level, 5);
      html += '<div class="' + cls + '">' + 'H' + level + ': ' + escapeHtml(text) + '</div>';
    }
    DOM.tocContent.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Load sample
  function loadSample() {
    DOM.input.value = [
      '---',
      'title: MoonBit Markdown Demo',
      'author: MoonBit Texteditor',
      'version: 1.0.0',
      '---',
      '',
      '# Welcome to MoonBit Markdown',
      '',
      'This is a **live** demonstration of the [MoonBit](https://www.moonbitlang.com) Markdown to HTML converter.',
      '',
      '## CommonMark Syntax',
      '',
      '### Text Formatting',
      '',
      '- **Bold** and *italic* text',
      '- `inline code` and ~~strikethrough~~',
      '- [Links](https://moonbitlang.com)',
      '',
      '### Code Blocks',
      '',
      '```rust',
      'fn greet(name: String) -> String {',
      '    return "Hello, " + name',
      '}',
      '',
      'fn main() {',
      '    println(greet("MoonBit"))',
      '}',
      '```',
      '',
      '### Block Quotes',
      '',
      '> The quick brown fox jumps over the lazy dog.',
      '> This is a block quote with multiple lines.',
      '>',
      '> > Nested quotes are also supported!',
      '',
      '## GFM Extensions',
      '',
      '### Tables',
      '',
      '| Syntax | Support | Notes |',
      '|--------|---------|-------|',
      '| Headings | ✅ | ATX & Setext |',
      '| Lists | ✅ | Ordered & Unordered |',
      '| Tables | ✅ | GFM pipe tables |',
      '| Task Lists | ✅ | Checkbox items |',
      '| Strikethrough | ✅ | ~~text~~ |',
      '| Autolinks | ✅ | https://example.com |',
      '',
      '### Task List',
      '',
      '- [x] Implement CommonMark core',
      '- [x] Add GFM tables',
      '- [x] Add task lists',
      '- [x] Add strikethrough and autolinks',
      '- [ ] Add syntax highlighting',
      '',
      '## Horizontal Rule',
      '',
      '---',
      '',
      '> **Note:** This entire page is rendered by MoonBit code compiled to WebAssembly-compatible JavaScript via `moon build --target js`.',
    ].join('\n');
    DOM.charCount.textContent = DOM.input.value.length;
    render();
  }

  // Clear
  function clearAll() {
    DOM.input.value = '';
    DOM.charCount.textContent = '0';
    DOM.preview.innerHTML = '<p style="color:var(--text-muted);font-style:italic;">请输入 Markdown 文本...</p>';
    DOM.htmlSize.textContent = '0';
    DOM.rawContent.textContent = '';
    DOM.rawOutput.classList.remove('visible');
    DOM.tocPanel.classList.remove('visible');
    setStatus('已清空', '');
  }

  // Copy raw HTML
  function copyRaw() {
    var text = DOM.rawContent.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      setStatus('原始 HTML 已复制到剪贴板', 'ready');
    }).catch(function() {
      setStatus('复制失败', 'error');
    });
  }

  // Show/hide raw output
  DOM.optShowRaw.addEventListener('change', function() {
    if (this.checked && DOM.rawContent.textContent) {
      DOM.rawOutput.classList.add('visible');
    } else {
      DOM.rawOutput.classList.remove('visible');
    }
  });

  DOM.optShowToc.addEventListener('change', function() {
    if (!this.checked) {
      DOM.tocPanel.classList.remove('visible');
    } else if (DOM.input.value.trim()) {
      render();
    }
  });

  // Keyboard shortcut: Ctrl+Enter to render
  DOM.input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      render();
    }
  });

  // Bind events
  DOM.btnRender.addEventListener('click', render);
  DOM.btnClear.addEventListener('click', clearAll);
  DOM.btnSample.addEventListener('click', loadSample);
  DOM.btnCopyRaw.addEventListener('click', copyRaw);

  // Auto-load sample and render on startup
  DOM.overlay.classList.add('active');
  waitForModule();
  setTimeout(function() {
    if (checkModule()) {
      loadSample();
    }
  }, 500);

})();
</script>
</body>
</html>
